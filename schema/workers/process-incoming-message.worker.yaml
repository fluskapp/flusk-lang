name: ProcessIncomingMessage
type: bullmq
retry:
  maxAttempts: 3
  backoff: exponential
steps:
  - id: load-message
    action: load
    source: message
  - id: generate-ai-reply
    call: generateAiReply
  - id: send-whatsapp-message
    call: sendWhatsappMessage
  - id: update-conversation
    action: update
