name: Secret
fields:
  - name: account_id
    type: integer
    index: true
  - name: assistant_id
    type: integer
    required: false
    index: true
    description: Scoped to a specific assistant, or null for account-wide
  - name: key
    type: string
    description: Identifier for this secret (e.g. llm_api_key, stripe_secret)
  - name: encrypted_value
    type: string
    description: AES-256-GCM encrypted secret value
  - name: provider
    type: string
    required: false
    description: Service provider this secret belongs to
  - name: expires_at
    type: datetime
    required: false
  - name: rotated_at
    type: datetime
    required: false
queries:
  - name: findByAccountAndKey
    sql: SELECT * FROM secret WHERE account_id = ? AND key = ?
  - name: findByAssistant
    sql: SELECT * FROM secret WHERE assistant_id = ?
  - name: findExpiring
    sql: SELECT * FROM secret WHERE account_id = ? AND expires_at < ?
relations:
  - entity: Account
    type: belongs-to
    foreignKey: account_id
