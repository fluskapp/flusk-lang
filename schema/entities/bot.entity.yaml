name: Bot
description: A managed AI bot instance. Runtime-agnostic — today OpenClaw, tomorrow anything.
fields:
  - name: name
    type: string
    required: true
    description: User-chosen name for the bot
  - name: owner_id
    type: integer
    index: true
    description: User who owns this bot
  - name: runtime
    type: enum
    default: openclaw
    values:
      - openclaw
      - langchain
      - crewai
      - generic
    description: Which AI runtime this bot uses
  - name: runtime_url
    type: string
    required: false
    description: URL of the runtime (e.g. localhost:18789)
  - name: runtime_status
    type: enum
    default: unknown
    values:
      - running
      - stopped
      - provisioning
      - error
      - unknown
  - name: tier
    type: enum
    default: free
    values:
      - free
      - starter
      - pro
      - power
  - name: model
    type: string
    required: false
    description: Current LLM model
  - name: soul
    type: text
    required: false
    description: Path or content of SOUL.md
  - name: identity
    type: text
    required: false
    description: Path or content of IDENTITY.md
  - name: user_context
    type: text
    required: false
    description: Path or content of USER.md
  - name: workspace_path
    type: string
    required: false
    description: Local filesystem path to the bot workspace
  - name: active
    type: boolean
    default: true
queries:
  - name: findByOwner
    sql: SELECT * FROM bot WHERE owner_id = ?
  - name: findActive
    sql: SELECT * FROM bot WHERE owner_id = ? AND active = true
  - name: findByRuntime
    sql: SELECT * FROM bot WHERE runtime = ?
