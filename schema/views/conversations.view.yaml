name: Conversations
type: table
description: Browse all conversations with the assistant
route: /app/conversations
auth: true
ssr: false
data_sources:
  conversations:
    entity: Conversation
    query: findByAssistant
    params: [assistantId]
    order: created_at DESC
sections:
  - name: ConversationList
    type: grouped-list
    source: conversations
    group_by: date
    display:
      - field: channel
        type: icon-label
      - field: created_at
        type: time
      - field: preview
        type: text-truncate
        max_length: 60
      - field: message_count
        type: badge
    search:
      enabled: true
      fields: [preview, channel]
    filters:
      - field: channel
        type: multi-select
        options: [whatsapp, telegram, discord, slack, web]
    on_click:
      action: navigate
      to: /app/conversations/:id
