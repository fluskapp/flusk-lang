name: Settings
type: form
description: Bot personality, downloads, and account management
route: /app/settings
auth: true
ssr: false

design:
  theme: monochrome
  background: white
  text: black
  accent: black

data_sources:
  bot:
    endpoint: GET /api/gateway/status
    description: "Current bot status and configuration"
  user:
    endpoint: GET /api/gateway/account/me
    description: "Current user account info"

sections:
  - name: Personality
    type: settings-group
    title: "Personality"
    description: "Shape how your bot thinks, speaks, and behaves"
    fields:
      - name: name
        type: text
        label: "Bot Name"
        placeholder: "FLUSK"
        source: bot.name
      - name: soul
        type: textarea
        label: "Personality (SOUL.md)"
        rows: 10
        description: "Define how your bot behaves — its tone, personality, and focus areas"
        source: bot.soul
        endpoint_save: POST /api/gateway/config/soul
      - name: user_context
        type: textarea
        label: "About You (USER.md)"
        rows: 6
        description: "Tell your bot about yourself — name, job, preferences, family"
        source: bot.user_context
        endpoint_save: POST /api/gateway/config/user

  - name: Downloads
    type: settings-group
    title: "Downloads"
    description: "Get the native app for a better experience"
    items:
      - label: "Mac App"
        description: "Native Mac menubar app with background sync"
        icon: monitor
        action:
          label: "Download"
          action: download
          url: "https://flusk.app/download/mac"
      - label: "iOS App"
        description: "Manage your bot from your iPhone"
        icon: smartphone
        action:
          label: "Coming Soon"
          disabled: true

  - name: GodMode
    type: settings-group
    title: "God Mode"
    description: "Full access to your bot's workspace — every file, every config"
    fields:
      - name: workspace_path
        type: display
        label: "Workspace Path"
        source: bot.workspace_path
      - name: config_path
        type: display
        label: "Config Path"
        source: bot.config_path
    actions:
      - label: "Open Workspace"
        action: api-call
        endpoint: GET /api/gateway/workspace/files
        variant: secondary
      - label: "View Config"
        action: api-call
        endpoint: GET /api/gateway/config
        variant: secondary
      - label: "Restart Bot"
        action: api-call
        endpoint: POST /api/gateway/restart
        confirm: "Restart your bot? Active conversations will be interrupted."
        variant: secondary

  - name: GitBackup
    type: settings-group
    title: "Git Backup"
    description: "Back up your bot's workspace to GitHub"
    fields:
      - name: backup_repo
        type: text
        label: "Repository URL"
        placeholder: "git@github.com:user/my-bot-backup.git"
        source: backup.repo_url
    actions:
      - label: "Initialize Backup"
        action: api-call
        endpoint: POST /api/backup/init
        variant: secondary
      - label: "Push Now"
        action: api-call
        endpoint: POST /api/backup/push
        variant: default

  - name: DangerZone
    type: settings-group
    title: "Danger Zone"
    variant: destructive
    fields:
      - name: email
        type: display
        label: "Account Email"
        source: user.email
      - name: flusk_key
        type: display
        label: "Flusk Key"
        source: user.flusk_key
        format: masked-key
    actions:
      - label: "Export All Data"
        action: api-call
        endpoint: POST /api/account/export
        description: "Download all your data as a ZIP archive"
        variant: secondary
      - label: "Reset Bot"
        action: api-call
        endpoint: POST /api/gateway/reset
        confirm: "Reset your bot? This will clear its memory and settings."
        variant: destructive
      - label: "Delete Account"
        action: api-call
        endpoint: DELETE /api/account
        confirm: "Are you sure? This permanently deletes your bot and all data. There is no undo."
        variant: destructive
