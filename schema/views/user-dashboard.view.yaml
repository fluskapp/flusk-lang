name: UserDashboard
type: dashboard
description: Main user dashboard — day summaries, assistant status, simple and clean
route: /app/dashboard
auth: true
ssr: false
data_sources:
  assistant:
    entity: Assistant
    query: findByUser
    params: [currentUserId]
  channels:
    entity: Channel
    query: findByAssistant
    params: [assistantId]
  todaySummary:
    entity: DaySummary
    query: findByDate
    params: [assistantId, today]
  recentSummaries:
    entity: DaySummary
    query: findRecent
    params: [assistantId, 7]
  guardPolicy:
    entity: GuardPolicy
    query: findByAssistant
    params: [assistantId]
sections:
  - name: AssistantStatus
    type: status-card
    title: "Your Assistant"
    fields:
      - name: status
        label: "Status"
        type: status-indicator
        source: assistant.container_status
      - name: plan
        label: "Machine"
        source: assistant.machine_tier
        format: tier-label
      - name: model
        label: "Model"
        source: assistant.llm_model
      - name: guard
        label: "Guard"
        type: status-indicator
        value: active
        icon: shield

  - name: Channels
    type: card-list
    title: "Connected Channels"
    source: channels
    display:
      - field: type
        label: "Channel"
        type: icon-label
      - field: status
        label: "Status"
        type: status-badge
      - field: message_count
        label: "Messages"
        type: number
    actions:
      - label: "+ Connect Channel"
        action: navigate
        to: /app/channels
    empty_state:
      title: "No channels connected"
      description: "Connect WhatsApp, Telegram, or Discord to start chatting"
      action:
        label: "Connect a Channel"
        to: /app/channels

  - name: TodaySummary
    type: content-card
    title: "Today"
    source: todaySummary
    display:
      field: summary_text
      type: markdown
      fallback: "Your assistant hasn't had any conversations today yet. Send a message to get started! 🦞"
    footer:
      stats:
        - label: "Messages"
          field: message_count
        - label: "Actions"
          field: action_count
        - label: "Cost"
          field: cost_cents
          format: currency
        - label: "Guard Blocks"
          field: guard_blocks
          condition: "guard_blocks > 0"
          type: warning-badge

  - name: RecentDays
    type: timeline
    title: "This Week"
    source: recentSummaries
    display:
      date_field: date
      content_field: summary_text
      mood_field: mood
      stats:
        - field: message_count
          label: "msgs"
        - field: cost_cents
          label: "cost"
          format: currency
    on_click:
      action: navigate
      to: /app/days/:date
