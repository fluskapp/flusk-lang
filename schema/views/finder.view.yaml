name: Finder
type: page
description: "Finder-style file browser for bot's working files"
route: /app/finder
auth: true
ssr: false

design:
  theme: monochrome
  reference: "macOS Finder clone — github.com/guyariely/finder-clone"

data_sources:
  files:
    endpoint: GET /api/gateway/pichefkes
    description: "Files in the bot's working directory"
    unwrap: files

sections:
  - name: FinderView
    type: data-table
    title: "Finder"
    description: "Files your bot creates as it works — notes, research, drafts"
    source: files
    columns:
      - key: name
        label: "Name"
        type: text
        sortable: true
      - key: size
        label: "Size"
        type: filesize
        sortable: true
      - key: modified
        label: "Modified"
        type: relative-time
        sortable: true
      - key: type
        label: "Kind"
        type: text
    empty_state:
      title: "No files yet"
      description: "Your bot will drop files here as it works — notes, research, drafts, anything useful"
    pageSize: 50
