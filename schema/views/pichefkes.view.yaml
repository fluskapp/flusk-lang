name: Pichefkes
type: page
description: "Finder-style file browser for bot's pichefkes directory"
route: /app/files
auth: true
ssr: false

design:
  theme: monochrome
  reference: "macOS Finder clone — github.com/guyariely/finder-clone"
  layout: finder
  background: white

data_sources:
  files:
    endpoint: GET /api/gateway/pichefkes
    description: "Files in the bot's pichefkes directory"
    unwrap: files

sections:
  - name: FinderView
    type: data-table
    title: "Pichefkes"
    source: files
    columns:
      - key: name
        label: "Name"
        type: text
        sortable: true
      - key: size
        label: "Size"
        type: filesize
        sortable: true
      - key: modified
        label: "Modified"
        type: relative-time
        sortable: true
      - key: type
        label: "Kind"
        type: text
    empty_state:
      title: "No pichefkes yet"
      description: "Your bot will drop files here as it works — notes, research, drafts, anything useful"
    row_actions:
      - label: "View"
        action: preview
      - label: "Download"
        action: download
        endpoint: GET /api/gateway/pichefkes/:name/download
      - label: "Delete"
        action: api-call
        endpoint: DELETE /api/gateway/pichefkes/:name
        confirm: "Delete this file?"
        variant: destructive
