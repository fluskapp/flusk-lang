name: Connectors
type: page
description: "Connect external triggers and event sources to your bot"
route: /app/connectors
auth: true
ssr: false

design:
  theme: monochrome

data_sources:
  connectors:
    endpoint: GET /api/gateway/connectors
    description: "Connected event sources and triggers"

sections:
  - name: ActiveConnectors
    type: data-table
    title: "Active Connectors"
    description: "Event sources that trigger your bot to take action"
    source: connectors
    columns:
      - key: name
        label: "Connector"
        type: text
        sortable: true
      - key: type
        label: "Type"
        type: status-badge
      - key: status
        label: "Status"
        type: status-badge
      - key: last_event
        label: "Last Event"
        type: relative-time
      - key: events_count
        label: "Events"
        type: number
    row_actions:
      - label: "Configure"
        action: modal
      - label: "Disconnect"
        action: api-call
        endpoint: DELETE /api/gateway/connectors/:id
        confirm: "Disconnect this connector?"
        variant: destructive
    empty_state:
      title: "No connectors yet"
      description: "Connect triggers to activate your bot — location changes, Jira updates, calendar events, and more"

  - name: AvailableConnectors
    type: card-grid
    title: "Available Connectors"
    description: "Connect new event sources"
    columns: 3
    static_data:
      - id: location
        name: "Location"
        description: "Trigger actions based on where you are"
        category: "trigger"
      - id: jira
        name: "Jira"
        description: "React to ticket updates, assignments, and comments"
        category: "trigger"
      - id: github-events
        name: "GitHub Events"
        description: "PRs, issues, CI runs — your bot stays in the loop"
        category: "trigger"
      - id: calendar
        name: "Google Calendar"
        description: "Meeting prep, schedule changes, reminders"
        category: "trigger"
      - id: email
        name: "Email (Gmail)"
        description: "Incoming emails trigger bot analysis and drafts"
        category: "trigger"
      - id: slack-events
        name: "Slack Events"
        description: "Channel messages, mentions, reactions"
        category: "trigger"
      - id: webhook
        name: "Custom Webhook"
        description: "Send any JSON payload to trigger your bot"
        category: "trigger"
      - id: cron
        name: "Scheduled Tasks"
        description: "Run actions on a schedule — daily summaries, weekly reports"
        category: "automation"
    card_actions:
      - label: "Connect"
        action: api-call
        endpoint: POST /api/gateway/connectors
