name: GuardEvents
type: table
description: Guard activity — what was blocked, flagged, or protected
route: /app/guard
auth: true
ssr: false
data_sources:
  guardPolicy:
    entity: GuardPolicy
    query: findByAssistant
    params: [assistantId]
  blockedEvents:
    entity: GuardEvent
    query: findBlocked
    params: [assistantId]
    limit: 50
  events:
    entity: GuardEvent
    query: findByAssistant
    params: [assistantId]
    order: created_at DESC
    limit: 100
sections:
  - name: GuardStatus
    type: status-card
    title: "Secured Claw Guard"
    description: "Your assistant's seatbelt. Everything goes through here."
    source: guardPolicy
    fields:
      - name: pii_detection
        label: "PII Protection"
        type: toggle-display
      - name: intent_matching
        label: "Intent Matching"
        type: toggle-display
      - name: cost_cap_cents
        label: "Monthly Budget"
        type: currency
      - name: sandbox_level
        label: "Sandbox"
        type: label
    actions:
      - label: "Configure Guard"
        action: navigate
        to: /app/settings/guard

  - name: RecentBlocks
    type: event-list
    title: "Recently Blocked"
    description: "Things your guard stopped from happening"
    source: blockedEvents
    display:
      - field: created_at
        type: timestamp
        format: "MMM D, HH:mm"
      - field: event_type
        type: label
      - field: details
        type: json-preview
        max_length: 100
    empty_state:
      title: "Nothing blocked"
      description: "Your assistant has been behaving. Good bot. 🦞"

  - name: AllEvents
    type: collapsible
    title: "All Guard Events"
    collapsed: true
    source: events
    display:
      - field: created_at
        type: timestamp
        format: "HH:mm:ss"
      - field: severity
        type: severity-badge
      - field: event_type
        type: label
        format: uppercase
      - field: channel
        type: icon
      - field: details
        type: json-preview
        max_length: 80
      - field: cost_cents
        type: currency
        condition: "cost_cents > 0"
      - field: blocked
        type: blocked-badge
        condition: "blocked == true"
    filters:
      - field: event_type
        type: multi-select
        label: "Type"
      - field: severity
        type: multi-select
        label: "Severity"
    actions:
      - label: "Export Logs"
        action: export
        format: csv
