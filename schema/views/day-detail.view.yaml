name: DayDetail
type: detail
description: Full day summary view — human-readable story of what happened
route: /app/days/:date
auth: true
ssr: false
data_sources:
  summary:
    entity: DaySummary
    query: findByDate
    params: [assistantId, routeParam.date]
  events:
    entity: GuardEvent
    query: findByTimeRange
    params: [assistantId, routeParam.date_start, routeParam.date_end]
sections:
  - name: DayHeader
    type: page-header
    source: summary
    display:
      title:
        type: date-format
        field: date
        format: "dddd, MMMM D"
      subtitle:
        type: mood-badge
        field: mood
      stats:
        - label: "Messages"
          field: message_count
          icon: message-square
        - label: "Actions"
          field: action_count
          icon: zap
        - label: "Cost"
          field: cost_cents
          format: currency
          icon: dollar-sign
        - label: "Channels"
          field: channels_used
          type: icon-list

  - name: DayStory
    type: content-card
    title: "What Happened"
    source: summary
    display:
      field: summary_text
      type: markdown

  - name: KeyDecisions
    type: tag-list
    title: "Key Decisions"
    source: summary
    field: key_decisions
    icon: check-circle
    condition: "key_decisions != null"

  - name: GoalsProgress
    type: progress-list
    title: "Goals"
    source: summary
    field: goals_progress
    icon: target
    condition: "goals_progress != null"

  - name: ThingsToRemember
    type: tag-list
    title: "Remembered"
    source: summary
    field: things_to_remember
    icon: brain
    condition: "things_to_remember != null"

  - name: GuardReport
    type: stat-grid
    columns: 3
    title: "Guard Report"
    stats:
      - label: "PII Detected"
        source: summary
        field: pii_detections
        icon: eye-off
        type: warning-stat
      - label: "Blocked Actions"
        source: summary
        field: guard_blocks
        icon: shield-off
        type: warning-stat
      - label: "Total Cost"
        source: summary
        field: cost_cents
        format: currency
        icon: dollar-sign

  - name: RawEvents
    type: collapsible
    title: "Raw Events (for nerds)"
    collapsed: true
    source: events
    display:
      - field: created_at
        type: timestamp
        format: "HH:mm:ss"
      - field: event_type
        type: label
      - field: details
        type: json-preview
        max_length: 80
