name: Triggers
type: page
description: "Manage triggers that activate your bot"
route: /app/triggers
auth: true
ssr: false

design:
  theme: monochrome

data_sources:
  triggers:
    endpoint: GET /api/gateway/triggers
    description: "All configured triggers"
    unwrap: triggers

sections:
  - name: TriggerList
    type: data-table
    title: "Triggers"
    description: "Event sources that activate your bot — each trigger sends a prompt when fired"
    source: triggers
    columns:
      - key: name
        label: "Name"
        type: text
        sortable: true
      - key: type
        label: "Type"
        type: status-badge
      - key: prompt
        label: "Prompt"
        type: text-preview
        max_length: 80
      - key: status
        label: "Status"
        type: status-badge
      - key: last_fired
        label: "Last Fired"
        type: relative-time
      - key: fire_count
        label: "Fired"
        type: number
    row_actions:
      - label: "Edit"
        action: modal
      - label: "Disable"
        action: api-call
        endpoint: POST /api/gateway/triggers/:id/toggle
      - label: "Delete"
        action: api-call
        endpoint: DELETE /api/gateway/triggers/:id
        confirm: "Delete this trigger?"
        variant: destructive
    empty_state:
      title: "No triggers yet"
      description: "Add a trigger to activate your bot when things happen — location changes, calendar events, scheduled tasks"
    pageSize: 25

  - name: AddTrigger
    type: form-action
    title: "Add Trigger"
    description: "Connect a new event source"
    fields:
      - name: name
        label: "Name"
        type: text
        placeholder: "e.g. Office Arrival"
      - name: type
        label: "Type"
        type: select
        options:
          - { value: location, label: "Location" }
          - { value: schedule, label: "Scheduled" }
          - { value: webhook, label: "Webhook" }
          - { value: github, label: "GitHub" }
          - { value: jira, label: "Jira" }
          - { value: calendar, label: "Calendar" }
          - { value: email, label: "Email" }
          - { value: slack, label: "Slack" }
      - name: prompt
        label: "Prompt"
        type: textarea
        placeholder: "What should the bot do when this trigger fires? e.g. 'I just arrived at the office, check my calendar and brief me on today'"
        rows: 3
      - name: config
        label: "Configuration"
        type: textarea
        placeholder: "Additional config (JSON) — e.g. location coordinates, cron expression, webhook URL"
        rows: 2
    action:
      label: "Add Trigger"
      endpoint: POST /api/gateway/triggers
      params_from: fields
