name: Triggers
type: page
description: "Connect external triggers and event sources to your bot"
route: /app/triggers
auth: true
ssr: false

design:
  theme: monochrome

data_sources:
  triggers:
    endpoint: GET /api/gateway/connectors
    description: "Connected event sources and triggers"

sections:
  - name: ActiveTriggers
    type: data-table
    title: "Active Triggers"
    description: "Event sources that trigger your bot to take action"
    source: triggers
    columns:
      - key: name
        label: "Trigger"
        type: text
        sortable: true
      - key: type
        label: "Type"
        type: status-badge
      - key: status
        label: "Status"
        type: status-badge
      - key: last_event
        label: "Last Event"
        type: relative-time
      - key: events_count
        label: "Events"
        type: number
    empty_state:
      title: "No triggers connected"
      description: "Connect event sources to activate your bot — location changes, Jira updates, calendar events"

  - name: AvailableTriggers
    type: card-grid
    title: "Available Triggers"
    description: "Connect new event sources to activate your bot"
    columns: 3
    static_data:
      - id: location
        name: "Location"
        description: "Trigger actions when you arrive or leave a place"
        category: "trigger"
      - id: jira
        name: "Jira"
        description: "React to ticket updates, assignments, and comments"
        category: "trigger"
      - id: github-events
        name: "GitHub"
        description: "PRs, issues, CI runs — your bot stays in the loop"
        category: "trigger"
      - id: calendar
        name: "Calendar"
        description: "Meeting prep, schedule changes, daily briefings"
        category: "trigger"
      - id: email
        name: "Email"
        description: "Incoming emails trigger analysis and smart replies"
        category: "trigger"
      - id: slack-events
        name: "Slack"
        description: "Channel messages, mentions, and reactions"
        category: "trigger"
      - id: webhook
        name: "Webhook"
        description: "Send any JSON payload to trigger your bot"
        category: "trigger"
      - id: cron
        name: "Scheduled"
        description: "Daily summaries, weekly reports, recurring tasks"
        category: "automation"
    card_actions:
      - label: "Connect"
        action: api-call
        endpoint: POST /api/gateway/connectors
