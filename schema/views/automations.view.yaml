name: Automations
type: table
description: Manage scheduled tasks and automations
route: /app/automations
auth: true
ssr: false
data_sources:
  schedules:
    entity: Schedule
    query: findByAssistant
    params: [assistantId]
sections:
  - name: AutomationList
    type: card-list
    source: schedules
    display:
      - field: name
        type: heading
      - field: cron_expression
        type: cron-human
      - field: prompt
        type: text-truncate
        max_length: 80
      - field: status
        type: status-badge
      - field: last_run_at
        type: relative-time
      - field: run_count
        type: badge
        prefix: "Runs: "
    actions:
      - label: "+ New Automation"
        action: create
        dialog: true
      - label: "Edit"
        action: edit
      - label: "Pause"
        action: update
        field: status
        value: paused
      - label: "Resume"
        action: update
        field: status
        value: active
        condition: "status == 'paused'"
      - label: "View History"
        action: navigate
        to: /app/automations/:id/history
    create_form:
      fields:
        - name: name
          type: text
          label: "Automation Name"
          required: true
          placeholder: "Morning Briefing"
        - name: prompt
          type: textarea
          label: "What should the assistant do?"
          required: true
          placeholder: "Check my calendar, summarize news, and send me a morning brief"
        - name: cron_expression
          type: text
          label: "Schedule (cron)"
          required: true
          placeholder: "0 7 * * *"
          description: "e.g., '0 7 * * *' = every day at 7:00 AM"
        - name: timezone
          type: select
          label: "Timezone"
          default: "UTC"
          options: [UTC, America/New_York, Europe/London, Asia/Jerusalem, Asia/Tokyo]
        - name: delivery
          type: select
          label: "Send result to"
          default: channel
          options:
            - value: channel
              label: "Main channel (WhatsApp/Telegram)"
            - value: silent
              label: "Log only (don't send)"
            - value: webhook
              label: "Webhook URL"
