name: Onboarding
type: chat-onboarding
description: Full-screen AI-driven onboarding — conversational setup with generative UI components
route: /onboarding
auth: true
ssr: false
layout: fullscreen
blocking: true  # User cannot skip — must complete to access dashboard
redirect_on_complete: /app/dashboard

design:
  theme: monochrome  # Black and white only
  background: white
  text: black
  accent: black

personality:
  name: FLUSK
  voice: "Sarcastic but tactful, witty with awareness, helpful with attitude"
  greeting: "Hey, I'm FLUSK — your bot that actually has a personality. Let's get you set up. Won't take long, promise."

steps:
  - name: welcome
    title: "Meet FLUSK"
    description: "Introduction and name collection"
    tool: show_welcome
    collects:
      - name
      - role
      - company
    generates: USER.md

  - name: personality
    title: "Your Style"
    description: "How the bot should talk"
    tool: ask_personality
    options:
      - id: professional
        label: "Professional"
        description: "Straight to the point, formal tone"
        icon: briefcase
      - id: casual
        label: "Casual"
        description: "Relaxed, friendly, like texting a friend"
        icon: message-circle
      - id: sarcastic
        label: "Sarcastic"
        description: "Witty, playful, with attitude (our favorite)"
        icon: flame
      - id: custom
        label: "Custom"
        description: "Tell me in your own words"
        icon: edit
    collects:
      - tone
      - language_preference
    generates: SOUL.md

  - name: use_cases
    title: "What Can I Help With?"
    description: "Primary use cases"
    tool: ask_use_cases
    options:
      - id: calendar
        label: "Calendar & Scheduling"
        icon: calendar
      - id: reminders
        label: "Reminders & Tasks"
        icon: bell
      - id: research
        label: "Web Research"
        icon: search
      - id: coding
        label: "Code Assistant"
        icon: code
      - id: writing
        label: "Writing & Editing"
        icon: pen-tool
      - id: home
        label: "Smart Home"
        icon: home
    collects:
      - selected_skills
    installs: skills

  - name: setup_mode
    title: "How to Run FLUSK"
    description: "Choose between local install or cloud"
    tool: show_setup_choice
    options:
      - id: local
        label: "Install on My Mac"
        description: "Full privacy. Everything runs on your machine. Free with your own API key."
        icon: laptop
        recommended: true
      - id: cloud
        label: "Use FLUSK Cloud"
        description: "No install needed. We handle everything. Starts at $19/mo."
        icon: cloud
    collects:
      - setup_mode

  - name: installation_local
    title: "Install FLUSK"
    description: "Download and install the Mac app"
    tool: show_download
    condition: "setup_mode === 'local'"
    platform: mac
    download_url: "https://flusk.app/download/mac"
    instructions:
      - "Download the .dmg file"
      - "Open and drag FLUSK to Applications"
      - "Launch FLUSK from Applications"
      - "It will auto-configure with your settings"

  - name: installation_cloud
    title: "Choose Your Plan"
    description: "Pick a cloud machine size"
    tool: show_cloud_plans
    condition: "setup_mode === 'cloud'"
    plans:
      - id: starter
        name: "Starter"
        price: "$19/mo"
        specs: "1 vCPU, 2GB RAM"
        description: "Perfect for personal use"
      - id: pro
        name: "Pro"
        price: "$49/mo"
        specs: "2 vCPU, 4GB RAM"
        description: "For power users and small teams"
        recommended: true
      - id: power
        name: "Power"
        price: "$99/mo"
        specs: "4 vCPU, 8GB RAM"
        description: "For heavy workloads and multiple bots"

  - name: api_key
    title: "API Key"
    description: "Connect your AI provider"
    tool: show_api_key_input
    condition: "setup_mode === 'local'"
    providers:
      - id: anthropic
        label: "Anthropic (Claude)"
        description: "Recommended — best for personal AI"
        recommended: true
      - id: openai
        label: "OpenAI (GPT)"
        description: "ChatGPT models"
      - id: google
        label: "Google (Gemini)"
        description: "Gemini models"
    collects:
      - api_provider
      - api_key

  - name: channels
    title: "Connect Channels"
    description: "Where to talk to your bot"
    tool: show_channels
    channels:
      - id: whatsapp
        label: "WhatsApp"
        icon: message-circle
        setup: qr-scan
        description: "Scan QR code from your phone"
      - id: telegram
        label: "Telegram"
        icon: send
        setup: bot-token
        description: "Connect via Telegram bot"
      - id: imessage
        label: "iMessage"
        icon: message-square
        setup: mac-app
        description: "Chat via iMessage on your Mac"
      - id: signal
        label: "Signal"
        icon: shield
        setup: phone-link
        description: "Connect via Signal on your phone"
      - id: discord
        label: "Discord"
        icon: hash
        setup: oauth
        description: "Add to your Discord server"

  - name: complete
    title: "You're All Set!"
    tool: show_complete
    message: "Your bot is configured and ready. Send a message and watch the magic happen."

outputs:
  - type: file
    name: SOUL.md
    source: personality_step
  - type: file
    name: USER.md
    source: welcome_step
  - type: config
    name: openclaw.json
    source: all_steps
  - type: db
    field: onboarding_completed
    value: true
