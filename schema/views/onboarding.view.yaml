name: Onboarding
type: marketing
description: Post-login onboarding — pick your machine and setup
route: /onboarding
auth: true
ssr: false
sections:
  - name: MachinePicker
    type: card-grid
    columns: 3
    title: "Pick your machine"
    subtitle: "Choose the right size for you — or run it free on your computer"
    cards:
      - name: local
        title: "Local"
        subtitle: "Your computer"
        price: "Free"
        price_period: "forever"
        features:
          - "Run on your own machine"
          - "Bring your own LLM key"
          - "Flusk Guard included"
          - "Dashboard access"
        cta: "Download"
        variant: outline
      - name: starter
        title: "Starter"
        subtitle: "Good for trying out"
        price: "$19"
        price_period: "/month"
        specs:
          cpu: "1 vCPU"
          memory: "512MB RAM"
          storage: "5GB Storage"
        features:
          - "All channels included"
          - "Bot GitHub account"
          - "Pre-installed skills"
          - "Event monitoring"
        cta: "Get Started"
        variant: default
      - name: pro
        title: "Pro"
        subtitle: "For daily use"
        price: "$49"
        price_period: "/month"
        badge: "Recommended"
        specs:
          cpu: "2 vCPU"
          memory: "2GB RAM"
          storage: "20GB Storage"
        features:
          - "Everything in Starter"
          - "Code execution"
          - "Advanced automations"
          - "Priority support"
        cta: "Get Started"
        variant: primary
      - name: power
        title: "Power"
        subtitle: "Heavy workloads"
        price: "$99"
        price_period: "/month"
        specs:
          cpu: "4 vCPU"
          memory: "8GB RAM"
          storage: "50GB Storage"
        features:
          - "Everything in Pro"
          - "Multiple agents"
          - "Custom skills"
          - "Max performance"
        cta: "Get Started"
        variant: default

  - name: LLMChoice
    type: form
    title: "AI Model"
    subtitle: "Bring your own key or pay through us"
    fields:
      - name: llm_mode
        type: radio
        options:
          - value: byok
            label: "I have my own key"
            description: "Paste your Anthropic, OpenAI, or Google key. Free."
          - value: managed
            label: "Use Flusk AI"
            description: "We handle the AI. Usage billed at cost + 15%."
      - name: llm_provider
        type: select
        label: "Provider"
        options: [anthropic, openai, google]
        condition: "llm_mode == 'byok'"
      - name: api_key
        type: password
        label: "API Key"
        placeholder: "sk-..."
        condition: "llm_mode == 'byok'"

  - name: ChannelSetup
    type: card-grid
    columns: 2
    title: "Connect your channels"
    subtitle: "Choose where you want to talk to your assistant"
    cards:
      - name: whatsapp
        title: "WhatsApp"
        icon: "message-circle"
        description: "Scan QR code to connect"
        action: "qr-scan"
      - name: telegram
        title: "Telegram"
        icon: "send"
        description: "Click to connect your Telegram"
        action: "oauth-link"
      - name: discord
        title: "Discord"
        icon: "hash"
        description: "Invite bot to your server"
        action: "oauth-link"
      - name: slack
        title: "Slack"
        icon: "slack"
        description: "Install Flusk app in Slack"
        action: "oauth-link"
      - name: web
        title: "Web Chat"
        icon: "globe"
        description: "Always available at flusk.app"
        action: "auto"
        default: true
