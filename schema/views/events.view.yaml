name: Events
type: tabbed
description: "All bot activity and guard events"
route: /app/events
auth: true
ssr: false

design:
  theme: monochrome

data_sources:
  events:
    endpoint: GET /api/gateway/events
    description: "All bot activity events"
    params:
      limit: 100
    unwrap: events
  guardEvents:
    endpoint: GET /api/gateway/events
    description: "Guard-flagged events"
    params:
      limit: 50
      blocked: true
    unwrap: events

tabs:
  - name: Activity
    label: "Activity"
    sections:
      - name: EventsTable
        type: data-table
        title: "Activity"
        source: events
        columns:
          - key: createdAt
            label: "Time"
            type: relative-time
            sortable: true
          - key: event_type
            label: "Type"
            type: status-badge
            sortable: true
          - key: summary
            label: "What happened"
            type: text-preview
            max_length: 120
        empty_state:
          title: "No events yet"
          description: "Activity will appear here as your bot processes messages"
        pageSize: 25

  - name: Guard
    label: "Guard"
    sections:
      - name: GuardTable
        type: data-table
        title: "Guard Events"
        description: "PII detections and blocked content"
        source: guardEvents
        columns:
          - key: createdAt
            label: "Time"
            type: relative-time
            sortable: true
          - key: pii_summary
            label: "Detected"
            type: text
          - key: blocked
            label: "Blocked"
            type: status-badge
          - key: source_url
            label: "Source"
            type: text
        empty_state:
          title: "No guard events"
          description: "PII detections and blocked content will appear here"
        pageSize: 25
