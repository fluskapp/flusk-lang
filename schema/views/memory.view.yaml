name: Memory
type: tabbed
description: "Bot memory — timeline and raw long-term memory"
route: /app/memory
auth: true
ssr: false

design:
  theme: monochrome

data_sources:
  timeline:
    endpoint: GET /api/gateway/memory/timeline
    description: "Day-by-day memory entries"
    unwrap: entries
  memoryRaw:
    endpoint: GET /api/gateway/memory/raw
    description: "Raw MEMORY.md content"

tabs:
  - name: Timeline
    label: "Timeline"
    sections:
      - name: DayEntries
        type: data-table
        title: "Memory Timeline"
        description: "Day-by-day notes and memories your bot has stored"
        source: timeline
        columns:
          - key: date
            label: "Date"
            type: date
            sortable: true
          - key: title
            label: "Title"
            type: text
          - key: preview
            label: "Content"
            type: text-preview
            max_length: 120
        empty_state:
          title: "No memory entries yet"
          description: "Your bot stores memories as you interact — conversations, decisions, preferences"

  - name: RawMemory
    label: "Raw"
    sections:
      - name: MemoryContent
        type: code-block
        title: "MEMORY.md"
        description: "The bot's long-term memory file — curated from daily notes"
        source: memoryRaw
        field: content
        language: markdown
        readonly: false
        endpoint_save: PUT /api/gateway/memory/raw
