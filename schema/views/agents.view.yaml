name: Agents
type: table
description: Manage agents — main assistant and sub-agents
route: /app/agents
auth: true
ssr: false
data_sources:
  agents:
    entity: Assistant
    query: findByAccount
    params: [accountId]
sections:
  - name: AgentList
    type: card-list
    source: agents
    display:
      - field: name
        type: heading
      - field: slug
        type: subtitle
      - field: llm_model
        type: badge
      - field: container_status
        type: status-badge
      - field: status
        type: status-indicator
    actions:
      - label: "+ New Agent"
        action: create
        dialog: true
      - label: "Configure"
        action: navigate
        to: /app/agents/:id
      - label: "View Logs"
        action: navigate
        to: /app/agents/:id/logs
    create_form:
      fields:
        - name: name
          type: text
          label: "Agent Name"
          required: true
        - name: llm_provider
          type: select
          label: "AI Provider"
          options: [anthropic, openai, google]
          default: anthropic
        - name: llm_model
          type: select
          label: "Model"
          options: [claude-sonnet-4-20250514, gpt-4o, gemini-2.0-flash]
          default: claude-sonnet-4-20250514
        - name: soul
          type: textarea
          label: "Personality (SOUL.md)"
          placeholder: "Describe how this agent should behave..."
