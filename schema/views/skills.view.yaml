name: Skills
type: tabbed
description: "Manage installed and available skills"
route: /app/skills
auth: true
ssr: false

design:
  theme: monochrome

data_sources:
  installed:
    endpoint: GET /api/gateway/skills
    description: "Installed skills"
    unwrap: skills

tabs:
  - name: Installed
    label: "Installed"
    sections:
      - name: InstalledSkills
        type: data-table
        title: "Installed Skills"
        source: installed
        columns:
          - key: name
            label: "Name"
            type: text
            sortable: true
          - key: description
            label: "Description"
            type: text-preview
            max_length: 80
          - key: version
            label: "Version"
            type: text
          - key: status
            label: "Status"
            type: status-badge
        row_actions:
          - label: "Disable"
            action: api-call
            endpoint: POST /api/gateway/skills/:id/disable
          - label: "Uninstall"
            action: api-call
            endpoint: POST /api/gateway/skills/uninstall
            params:
              name: "{{id}}"
            confirm: "Uninstall this skill?"
            variant: destructive
        empty_state:
          title: "No skills installed"
          description: "Install skills from the marketplace to extend your bot's capabilities"

  - name: Marketplace
    label: "Marketplace"
    sections:
      - name: InstallSkill
        type: form-action
        title: "Install a Skill"
        description: "Enter a skill name or ClawHub URL to install"
        fields:
          - name: skill_name
            label: "Skill Name"
            type: text
            placeholder: "e.g. answeroverflow or github.com/user/skill"
        action:
          label: "Install"
          endpoint: POST /api/gateway/skills/install
          params_from: fields
