        display:
          - field: name
            type: heading
          - field: description
            type: subtitle
          - field: category
            type: badge
        actions:
          - label: "Install"
            action: api-call
            endpoint: POST /api/gateway/skills/install
            params:
              name: "{{id}}"
            label_installed: "Installed"
            disabled_when: installed
