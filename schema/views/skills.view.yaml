            category: "Media"
          - id: peekaboo
            name: "Peekaboo"
            icon: eye
            description: "Screen capture and image analysis"
            category: "Media"
          - id: gifgrep
            name: "GIF Search"
            icon: image
            description: "Search and find GIFs"
            category: "Media"
          - id: spotify-player
            name: "Spotify"
            icon: music
