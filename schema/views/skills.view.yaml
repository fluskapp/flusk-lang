name: Skills
type: tabbed
description: Manage bot skills — installed and marketplace
route: /app/skills
auth: true
ssr: false

design:
  theme: monochrome
  background: white
  text: black
  accent: black

data_sources:
  installed:
    endpoint: GET /api/gateway/skills
    description: "Installed skills from the gateway"
    unwrap: skills

tabs:
  - id: installed
    label: "Installed"
    sections:
      - name: InstalledSkills
        type: card-grid
        columns: 3
        title: "Installed Skills"
        source: installed
        empty_state:
          title: "No skills installed"
          description: "Browse the marketplace to add skills to your bot"
        display:
          - field: name
            type: heading
            format: skill-name
          - field: description
            type: subtitle
          - field: status
            type: status-badge
        actions:
          - label: "Disable"
            action: api-call
            endpoint: POST /api/gateway/skills/:id/disable
          - label: "Uninstall"
            action: api-call
            endpoint: POST /api/gateway/skills/uninstall
            params:
              name: "{{id}}"
            confirm: "Uninstall this skill?"
            variant: destructive

  - id: marketplace
    label: "Marketplace"
    sections:
      - name: Marketplace
        type: card-grid
        columns: 3
        title: "All Skills"
        search:
          enabled: true
          fields: [name, description, category]
        filter:
          field: category
          options: [Productivity, Development, Communication, Media, Smart Home, Analytics, AI Tools]
        static_data:
          # --- Productivity ---
          - id: apple-notes
            name: "Apple Notes"
            icon: file-text
            description: "Read and write Apple Notes"
            category: "Productivity"
          - id: apple-reminders
            name: "Apple Reminders"
            icon: bell
            description: "Manage reminders and lists"
            category: "Productivity"
          - id: bear-notes
            name: "Bear Notes"
            icon: file-text
            description: "Manage Bear markdown notes"
            category: "Productivity"
          - id: things-mac
            name: "Things 3"
            icon: check-circle
            description: "Task management via Things CLI"
            category: "Productivity"
          - id: obsidian
            name: "Obsidian"
            icon: file-text
            description: "Manage Obsidian vault notes"
            category: "Productivity"
          - id: notion
            name: "Notion"
            icon: book-open
            description: "Create pages, databases, and blocks"
            category: "Productivity"
          - id: trello
            name: "Trello"
            icon: layout
            description: "Manage boards, lists, and cards"
            category: "Productivity"
          - id: google-calendar
            name: "Google Calendar"
            icon: calendar
            description: "Schedule events, check availability"
            category: "Productivity"
          - id: himalaya
            name: "Email (Himalaya)"
            icon: mail
            description: "Read and send emails via CLI"
            category: "Productivity"
          - id: ordercli
            name: "Orders"
            icon: shopping-cart
            description: "Track orders and deliveries"
            category: "Productivity"
          # --- Development ---
          - id: github
            name: "GitHub"
            icon: git-branch
            description: "Issues, PRs, CI runs, code review"
            category: "Development"
          - id: gh-issues
            name: "GitHub Issues"
            icon: alert-circle
            description: "Auto-fix issues and open PRs"
            category: "Development"
          - id: coding-agent
            name: "Coding Agent"
            icon: code
            description: "Delegate coding tasks to background agents"
            category: "Development"
          - id: skill-creator
            name: "Skill Creator"
            icon: plus-circle
            description: "Create and package new skills"
            category: "Development"
          - id: tmux
            name: "Tmux"
            icon: terminal
            description: "Terminal multiplexer control"
            category: "Development"
          # --- Communication ---
          - id: slack
            name: "Slack"
            icon: message-square
            description: "Send and manage Slack messages"
            category: "Communication"
          - id: discord
            name: "Discord"
            icon: hash
            description: "Manage Discord channels and messages"
            category: "Communication"
          - id: imsg
            name: "iMessage"
            icon: message-circle
            description: "Send and read iMessages"
            category: "Communication"
          - id: voice-call
            name: "Voice Call"
            icon: phone
            description: "Make and receive voice calls"
            category: "Communication"
          # --- Media ---
          - id: openai-image-gen
            name: "Image Generator"
            icon: image
            description: "Generate images with DALL-E"
            category: "Media"
          - id: openai-whisper
            name: "Whisper (Local)"
            icon: mic
